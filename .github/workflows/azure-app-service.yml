name: Azure App Service CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: license-validation-api-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION_PATH: ClientLicenseCheck.slnx
  API_PROJECT_PATH: LicenseValidation.Api/LicenseValidation.Api.csproj
  TEST_PROJECT_PATH: LicenseValidation.Tests/LicenseValidation.Tests.csproj
  AZURE_WEBAPP_NAME: serviceguardapi
  AZURE_WEBAPP_URL: https://serviceguardapi.azurewebsites.net
  PUBLISH_DIR: ./publish

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Run regression tests
        run: dotnet run --project ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build

      - name: Publish API
        run: |
          dotnet publish ${{ env.API_PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload published API artifact
        uses: actions/upload-artifact@v4
        with:
          name: license-validation-api
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ env.AZURE_WEBAPP_URL }}

    steps:
      - name: Download published API artifact
        uses: actions/download-artifact@v4
        with:
          name: license-validation-api
          path: ${{ env.PUBLISH_DIR }}

      - name: Validate publish profile secret
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_SERVICEGUARDAPI }}
        run: |
          if [ -z "$PUBLISH_PROFILE" ]; then
            echo "Missing GitHub secret: AZURE_WEBAPP_PUBLISH_PROFILE_SERVICEGUARDAPI"
            echo "Add the publish profile XML from Azure App Service > serviceguardapi > Get publish profile."
            exit 1
          fi

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_SERVICEGUARDAPI }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Smoke test liveness endpoint
        run: curl --fail --silent --show-error --max-time 30 ${{ env.AZURE_WEBAPP_URL }}/health/live

      - name: Smoke test readiness endpoint
        run: curl --fail --silent --show-error --max-time 30 ${{ env.AZURE_WEBAPP_URL }}/health/ready
